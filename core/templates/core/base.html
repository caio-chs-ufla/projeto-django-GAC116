<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}GymAccess{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f7fb; }
        .app-shell { min-height: 100vh; }
        .navbar-brand { font-weight: 700; letter-spacing: 0; }
        .metric-card { border: 1px solid #e6eaf2; border-radius: 8px; }
        .metric-value { font-size: 1.65rem; font-weight: 700; line-height: 1; }
        .table-wrap { border: 1px solid #e6eaf2; border-radius: 8px; overflow: hidden; background: #fff; }
        .section-title { font-size: 1rem; font-weight: 700; }
    </style>
</head>
<body>
<div class="app-shell">
    <nav class="navbar navbar-expand-lg bg-white border-bottom">
        <div class="container">
            <a class="navbar-brand text-primary" href="{% url 'dashboard' %}">GymAccess</a>
            {% if user.is_authenticated %}
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Abrir navegacao">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="mainNav">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link" href="{% url 'checkin_page' %}">Check-in</a></li>
                        {% if user.is_staff %}
                            <li class="nav-item"><a class="nav-link" href="{% url 'admin:index' %}">Admin</a></li>
                        {% endif %}
                    </ul>
                    <form method="post" action="{% url 'logout' %}" class="d-flex align-items-center gap-3">
                        {% csrf_token %}
                        <span class="text-secondary small">{{ user.get_full_name|default:user.username }}</span>
                        <button class="btn btn-outline-secondary btn-sm" type="submit">Sair</button>
                    </form>
                </div>
            {% endif %}
        </div>
    </nav>
    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
